name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  LLVM_VERSION: "21"
  LLVM_TAG: "llvmorg-21.1.8"
  PICOLIBC_TAG: "1.8.11"

jobs:
  build-sysroot:
    name: Build sysroot
    runs-on: ubuntu-24.04

    env:
      WORKSPACE: ${{ github.workspace }}/workspace
      DIST_DIR: ${{ github.workspace }}/workspace/rv32-llvm-picolibc
      INSTALL_PREFIX: /usr/local/llvm-riscv
      PICOLIBC_PREFIX: /usr/local
      PICOLIBC_CROSS_FILES_DIR: ${{ github.workspace }}/picolibc-cross-files
      XPACK_DIR: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install the same LLVM version used to build the sysroot, sourced
      # directly from the official apt.llvm.org repository.
      - name: Install LLVM ${{ env.LLVM_VERSION }} from apt.llvm.org
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh ${{ env.LLVM_VERSION }} all
          for tool in clang clang++ llvm-ar llvm-ranlib llvm-nm \
                      llvm-strip llvm-objcopy llvm-objdump llvm-size; do
            sudo ln -sf /usr/bin/${tool}-${{ env.LLVM_VERSION }} /usr/local/bin/${tool}
          done

      - name: Install build tools
        run: sudo apt-get install -y cmake ninja-build meson python3

      # Clone source trees using sparse checkout to fetch only the directories
      # needed for the build, keeping checkout time and disk usage minimal.
      - name: Clone llvm-project (${{ env.LLVM_TAG }})
        run: |
          git clone --depth=1 --branch ${{ env.LLVM_TAG }} --filter=blob:none --sparse \
            https://github.com/llvm/llvm-project.git \
            workspace/llvm-project
          cd workspace/llvm-project
          git sparse-checkout set \
            runtimes compiler-rt libcxx libcxxabi libunwind cmake llvm/cmake libc

      - name: Clone picolibc (${{ env.PICOLIBC_TAG }})
        run: |
          git clone --depth=1 --branch ${{ env.PICOLIBC_TAG }} \
            https://github.com/picolibc/picolibc.git \
            workspace/picolibc

      # Apply the vendor patch that enables bare-metal RISC-V builds in
      # compiler-rt without requiring an Apple-platform host.
      - name: Apply LLVM patch (${{ env.LLVM_TAG }})
        run: |
          cd workspace/llvm-project
          git apply "$XPACK_DIR/patches/${{ env.LLVM_TAG }}.patch"

      # multilib.yaml must be present in the llvm-project root so that
      # build-libcxx.sh can copy it into the assembled sysroot.
      - name: Copy multilib.yaml into llvm-project
        run: cp multilib.yaml workspace/llvm-project/

      # Build order matters: compiler-rt → picolibc → libcxx.
      # libcxx uses --sysroot pointing at DIST_DIR/dist which must already
      # contain compiler-rt and picolibc headers+libs.
      - name: Build compiler-rt
        run: |
          cd workspace/llvm-project
          bash "$XPACK_DIR/scripts/build-compiler_rt.sh"

      - name: Build picolibc
        run: |
          cd workspace/picolibc
          bash "$XPACK_DIR/scripts/build-picolibc.sh"

      - name: Build libcxx / libcxxabi / libunwind
        run: |
          cd workspace/llvm-project
          bash "$XPACK_DIR/scripts/build-libcxx.sh"

      # Package into a tarball with the same layout used by GitHub Releases:
      #   rv32-llvm-picolibc-<VERSION>/
      #     dist/    ← sysroot (multilib variants + multilib.yaml)
      #     cmake/   ← CMake toolchain files
      - name: Package sysroot
        run: |
          VERSION=$(jq -r .version package.json)
          OUTDIR="$GITHUB_WORKSPACE" \
            VERSION="$VERSION" \
            bash scripts/package-dist.sh

      - name: Upload sysroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: rv32-sysroot
          path: rv32-llvm-picolibc-*.tar.gz
          retention-days: 7

  test-toolchain:
    name: Test toolchain usability
    needs: build-sysroot
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install the same LLVM version used to build the sysroot, sourced
      # directly from the official apt.llvm.org repository.
      - name: Install LLVM ${{ env.LLVM_VERSION }} from apt.llvm.org
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh ${{ env.LLVM_VERSION }} all
          for tool in clang clang++ llvm-ar llvm-ranlib llvm-nm \
                      llvm-strip llvm-objcopy llvm-objdump llvm-size; do
            sudo ln -sf /usr/bin/${tool}-${{ env.LLVM_VERSION }} /usr/local/bin/${tool}
          done

      - name: Install cmake and ninja
        run: sudo apt-get install -y cmake ninja-build

      # Fetch the sysroot tarball produced by the build-sysroot job.
      # The tarball layout is:
      #   rv32-llvm-picolibc-<ver>/
      #     dist/    ← LLVM_TOOLCHAIN sysroot (multilib)
      #     cmake/   ← toolchain files bundled in the release
      - name: Download sysroot artifact
        uses: actions/download-artifact@v4
        with:
          name: rv32-sysroot
          path: /tmp/artifact

      - name: Extract sysroot
        run: |
          mkdir -p /tmp/rv32-sysroot
          tar xzf /tmp/artifact/rv32-llvm-picolibc-*.tar.gz \
            -C /tmp/rv32-sysroot --strip-components=1

      # ── Compile hello world against each toolchain variant ────────────────
      # LLVM_TOOLCHAIN is auto-inferred from the toolchain file location
      # (cmake/ and dist/ are siblings inside the extracted tarball).
      - name: Build hello world — CH32V (rv32imafc / ilp32f, no-exn/no-rtti)
        run: |
          cmake -G Ninja \
            -B build/test-ch32v \
            -S tests/hello_world \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/rv32-sysroot/cmake/clang-riscv-ch32v.cmake
          cmake --build build/test-ch32v

      - name: Build hello world — CH32V (rv32imafc / ilp32f, exn+rtti)
        run: |
          cmake -G Ninja \
            -B build/test-ch32v-exn-rtti \
            -S tests/hello_world \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/rv32-sysroot/cmake/clang-riscv-ch32v-exn-rtti.cmake
          cmake --build build/test-ch32v-exn-rtti

      # ── Compile hello world against the CH32V20x (rv32imac / ilp32) toolchain ─
      - name: Build hello world — CH32V20x (rv32imac / ilp32, no-exn/no-rtti)
        run: |
          cmake -G Ninja \
            -B build/test-ch32v20x \
            -S tests/hello_world \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/rv32-sysroot/cmake/clang-riscv-ch32v20x.cmake
          cmake --build build/test-ch32v20x

      - name: Build hello world — CH32V20x (rv32imac / ilp32, exn+rtti)
        run: |
          cmake -G Ninja \
            -B build/test-ch32v20x-exn-rtti \
            -S tests/hello_world \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/rv32-sysroot/cmake/clang-riscv-ch32v20x-exn-rtti.cmake
          cmake --build build/test-ch32v20x-exn-rtti

      # ── Compile hello world against the minimal (no-locale) toolchain variants ─
      - name: Build hello world — CH32V (rv32imafc / ilp32f, minimal/no-locale)
        run: |
          cmake -G Ninja \
            -B build/test-ch32v-minimal \
            -S tests/hello_world \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/rv32-sysroot/cmake/clang-riscv-ch32v-minimal.cmake
          cmake --build build/test-ch32v-minimal

      - name: Build hello world — CH32V20x (rv32imac / ilp32, minimal/no-locale)
        run: |
          cmake -G Ninja \
            -B build/test-ch32v20x-minimal \
            -S tests/hello_world \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/rv32-sysroot/cmake/clang-riscv-ch32v20x-minimal.cmake
          cmake --build build/test-ch32v20x-minimal
