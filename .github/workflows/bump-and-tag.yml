name: Bump version and tag

on:
  workflow_dispatch:
    inputs:
      llvm_ver:
        description: 'LLVM version (e.g. 21.1.8)'
        required: true
        type: string
      picolibc_ver:
        description: 'picolibc version (e.g. 1.8.11)'
        required: true
        type: string
      release_num:
        description: 'Release number (e.g. 1)'
        required: true
        default: '1'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Update version references
        run: |
          bash scripts/update-version.sh \
            "${{ inputs.llvm_ver }}" \
            "${{ inputs.picolibc_ver }}" \
            "${{ inputs.release_num }}"

      - name: Commit version changes and open PR
        run: |
          RELEASE_VERSION="${{ inputs.llvm_ver }}-${{ inputs.picolibc_ver }}-${{ inputs.release_num }}"
          BRANCH="chore/bump-version-${RELEASE_VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -b "${BRANCH}"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore: bump version to ${RELEASE_VERSION} [skip ci]"
            git push origin "${BRANCH}"
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore: bump version to ${RELEASE_VERSION}" \
              --body "Automated version bump to ${RELEASE_VERSION}."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push annotated tag
        run: |
          bash scripts/tag-release.sh \
            "${{ inputs.llvm_ver }}" \
            "${{ inputs.picolibc_ver }}" \
            "${{ inputs.release_num }}"
          git push origin "v${{ inputs.llvm_ver }}-${{ inputs.picolibc_ver }}-${{ inputs.release_num }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
